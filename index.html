<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intensivão JavaScript - Hashtag</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
        @import "tailwindcss";
    </style>
</head>

<body class="bg-black text-gray-800">
    <header class="bg-gray-800 text-white p-4 text-center">
        <h1 class="text-2xl font-bold">Intensivão JavaScript - Hashtag</h1>
    </header>

    <main class="p-4 flex flex-wrap items-center justify-center min-h-screen">
        <section id="container-produto" class="flex flex-wrap gap-6 justify-center items-stretch max-w-7xl mx-auto">
        </section>
    </main>

    <footer class="bg-gray-800 text-white p-4 text-center mt-8">
        <p>&copy; 2026 Intensivão JavaScript - Hashtag</p>
    </footer>

    <script>

        const produto_1 = {
            id: 1,
            nome: "Notebook",
            preco: 5000,
            estoque: 10,
            descricao: "Notebook Gamer com processador Intel Core i7, 16GB de RAM, placa de vídeo NVIDIA GeForce RTX 3060, armazenamento SSD de 512GB e tela de 15,6 polegadas com resolução Full HD. Ideal para jogos e tarefas exigentes.",
            nomeArquivoImagem: "notebook.png"
        };

        const produto_2 = {
            id: 2,
            nome: "Smartphone",
            preco: 3000,
            estoque: 20,
            nomeArquivoImagem: "smartphone.png",
            descricao: "Smartphone de última geração com tela AMOLED de 6,5 polegadas, processador octa-core, 8GB de RAM, armazenamento interno de 128GB, câmera traseira tripla de 48MP e bateria de longa duração. Perfeito para quem busca desempenho e qualidade fotográfica."
        };

        const produto_3 = {
            id: 3,
            nome: "bateria externa",
            preco: 150,
            estoque: 50,
            nomeArquivoImagem: "bateria_externa.png",
            descricao: "bateria hugão produções"
        };
           const produto_4 = {
            id: 4,
            nome: "Notebook",
            preco: 5000,
            estoque: 10,
            descricao: "Notebook Gamer com processador Intel Core i7, 16GB de RAM, placa de vídeo NVIDIA GeForce RTX 3060, armazenamento SSD de 512GB e tela de 15,6 polegadas com resolução Full HD. Ideal para jogos e tarefas exigentes.",
            nomeArquivoImagem: "notebook.png"
        };

        const produto_5 = {
            id: 5,
            nome: "Smartphone",
            preco: 3000,
            estoque: 20,
            nomeArquivoImagem: "smartphone.png",
            descricao: "Smartphone de última geração com tela AMOLED de 6,5 polegadas, processador octa-core, 8GB de RAM, armazenamento interno de 128GB, câmera traseira tripla de 48MP e bateria de longa duração. Perfeito para quem busca desempenho e qualidade fotográfica."
        };

        const produto_6 = {
            id: 6,
            nome: "bateria externa",
            preco: 150,
            estoque: 50,
            nomeArquivoImagem: "bateria_externa.png",
            descricao: "bateria hugão produções"
        };

        const catalogo = [produto_1, produto_2, produto_3, produto_4, produto_5, produto_6];

        for (const produto of catalogo) {
            const cartaoProduto = `
                <div class="
                    w-80
                    border-2 
                    border-gray-300 
                    p-5 
                    rounded-xl 
                    bg-white 
                    shadow-lg
                    flex 
                    flex-col 
                    items-center 
                    justify-between
                    gap-3
                    hover:shadow-xl 
                    transition-shadow
                    duration-300">
                    
                    <img 
                        src="./assets/${produto.nomeArquivoImagem}" 
                        alt="${produto.nome}" 
                        class="w-full h-48 object-cover rounded-lg border border-gray-200">
                    
                    <h3 class="text-xl font-bold text-gray-800 text-center">${produto.nome}</h3>
                    
                    <p class="text-2xl font-bold text-green-600">R$ ${produto.preco.toFixed(2)}</p>
                    
                    <p class="text-sm text-gray-600">
                        <span class="font-semibold">Estoque:</span> ${produto.estoque} unidades
                    </p>
                    
                    <p class="text-gray-600 text-sm text-center line-clamp-3">
                        ${produto.descricao}
                    </p>
                    
                    <button class="
                        bg-blue-500 
                        text-white 
                        px-5 
                        py-2 
                        rounded-lg 
                        hover:bg-blue-600 
                        transition 
                        w-full
                        font-semibold">
                        Comprar
                    </button>
                </div>
            `;
            
            document.getElementById("container-produto").innerHTML += cartaoProduto;
        }
    </script>
</body>

</html>
